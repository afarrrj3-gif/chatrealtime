<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekber MC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HALAMAN UTAMA -->
<div id="page-home">
    <div class="container">
        <!-- Foto Profil -->
        <div class="profile-box">
            <img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766845910/IMG-20251128-WA0094_1_rrrhdn.jpg" class="profile-pic">
            <h1>AryanzUtama</h1>
            <p>Rekber Middleman</p>
        </div>

        <!-- Pilihan Role -->
        <div class="menu-grid">
            <button onclick="goToBuyer()" class="menu-btn buyer">
                <span>🛒</span>
                <div>BUYER</div>
            </button>
            
            <button onclick="goToSeller()" class="menu-btn seller">
                <span>🏪</span>
                <div>SELLER</div>
            </button>
        </div>

        <!-- Hidden Admin Trigger -->
        <div onclick="adminLogin()" class="admin-trigger">
            PoweredByAryanzUtama
        </div>
    </div>
</div>

<!-- FORM BUYER -->
<div id="page-buyer" style="display:none;">
    <div class="container">
        <button onclick="goBack()" class="back">‹ Kembali</button>
        <h2>Masuk sebagai Buyer</h2>
        
        <input type="text" id="buyer-name" placeholder="Nama Lengkap">
        <input type="tel" id="buyer-wa" placeholder="Nomor WhatsApp">
        <input type="number" id="buyer-code" placeholder="Kode Room (6 digit)" oninput="checkBuyer()">
        
        <button id="btn-join-buyer" onclick="joinBuyer()" disabled class="btn-primary">
            Masuk Room
        </button>
    </div>
</div>

<!-- FORM SELLER -->
<div id="page-seller" style="display:none;">
    <div class="container">
        <button onclick="goBack()" class="back">‹ Kembali</button>
        <h2>Buat Room Baru</h2>
        
        <input type="text" id="seller-name" placeholder="Nama Anda">
        <input type="text" id="nominal" placeholder="Nominal (contoh: 50000)" onkeyup="formatMoney()">
        <div id="money-display" class="money-text">Rp0</div>
        
        <div class="type-box">
            <label>Tipe:</label>
            <button onclick="setType('inc')" id="t-inc" class="type-btn">INC</button>
            <button onclick="setType('exc')" id="t-exc" class="type-btn">EXC</button>
        </div>
        <input type="hidden" id="type-val">
        
        <input type="tel" id="seller-wa" placeholder="Nomor WhatsApp" oninput="checkSeller()">
        
        <button id="btn-create" onclick="createRoom()" disabled class="btn-primary btn-green">
            Buat Room
        </button>
        
        <div id="room-box" style="display:none;" class="result-card">
            <div class="code-title">ROOM CODE</div>
            <div class="code-num" id="room-code">000000</div>
            <button onclick="copyCode()" class="btn-copy">📋 Salin</button>
            <button onclick="enterChat('seller')" class="btn-primary">Masuk Room</button>
        </div>
    </div>
</div>

<!-- ADMIN LOGIN -->
<div id="page-admin-login" style="display:none;" class="modal">
    <div class="modal-box">
        <h3>🔐 Admin Access</h3>
        <input type="password" id="admin-pass" placeholder="Password">
        <button onclick="checkPass()" class="btn-primary">Masuk</button>
        <button onclick="closeAdmin()" class="btn-cancel">Batal</button>
    </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="page-admin" style="display:none;">
    <div class="admin-header">
        <span>Admin Panel</span>
        <button onclick="logout()">Keluar</button>
    </div>
    <div id="admin-rooms" class="room-list">
        <div class="loading">Memuat...</div>
    </div>
</div>

<!-- CHAT ROOM -->
<div id="page-chat" style="display:none;">
    <div class="chat-header">
        <button onclick="exitChat()" class="back">‹</button>
        <img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766845910/IMG-20251128-WA0094_1_rrrhdn.jpg" class="header-ava">
        <div class="header-info">
            <div id="head-nominal">Rp0</div>
            <div id="head-type">-</div>
        </div>
    </div>
    
    <div id="chat-messages" class="chat-box"></div>
    
    <div class="input-bottom">
        <button onclick="document.getElementById('file-in').click()" class="attach">📎</button>
        <input type="file" id="file-in" style="display:none" accept="image/*" onchange="sendImage(this)">
        
        <div class="input-wrap">
            <input type="text" id="msg-in" placeholder="Pesan" onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()" class="send-btn">➤</button>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDpQhIcitZwMMhQIHhpB9rp_k0EpBJT-2k",
        authDomain: "chat-real-time-32576.firebaseapp.com",
        databaseURL: "https://chat-real-time-32576-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-real-time-32576",
        storageBucket: "chat-real-time-32576.appspot.com",
        messagingSenderId: "21431357525",
        appId: "1:21431357525:web:5a32eb1ae3f59a485e04dc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    
    // Telegram
    const BOT_TOKEN = "8672339759:AAF_jy2iB5xZlHh6843s-8RkukvJ5-yROto";
    const CHAT_ID = "7129085772";
    
    let userRole = '';
    let userName = '';
    let roomId = '';
    let transType = '';
    
    // Navigasi Sederhana
    function showPage(id) {
        document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
        document.getElementById('page-' + id).style.display = 'block';
    }
    
    function goToBuyer() {
        showPage('buyer');
    }
    
    function goToSeller() {
        showPage('seller');
    }
    
    function goBack() {
        showPage('home');
    }
    
    function adminLogin() {
        showPage('admin-login');
    }
    
    function closeAdmin() {
        showPage('home');
    }
    
    function checkPass() {
        if(document.getElementById('admin-pass').value === 'khansa') {
            showPage('admin');
            loadAdminRooms();
        } else {
            alert('Password salah!');
        }
    }
    
    function logout() {
        showPage('home');
    }
    
    // Format Uang
    function formatMoney() {
        let val = document.getElementById('nominal').value.replace(/\D/g, '');
        document.getElementById('nominal').value = val;
        if(val) {
            document.getElementById('money-display').textContent = 
                'Rp' + parseInt(val).toLocaleString('id-ID');
        }
    }
    
    // Pilih Type
    function setType(t) {
        transType = t;
        document.getElementById('type-val').value = t;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');
        checkSeller();
    }
    
    // Validasi
    function checkBuyer() {
        let n = document.getElementById('buyer-name').value;
        let w = document.getElementById('buyer-wa').value;
        let c = document.getElementById('buyer-code').value;
        document.getElementById('btn-join-buyer').disabled = !(n && w && c.length === 6);
    }
    
    function checkSeller() {
        let n = document.getElementById('seller-name').value;
        let m = document.getElementById('nominal').value;
        let w = document.getElementById('seller-wa').value;
        let t = document.getElementById('type-val').value;
        document.getElementById('btn-create').disabled = !(n && m && w && t);
    }
    
    // Buat Room
    function createRoom() {
        userName = document.getElementById('seller-name').value;
        roomId = String(Math.floor(100000 + Math.random() * 900000));
        
        document.getElementById('room-code').textContent = roomId;
        document.getElementById('room-box').style.display = 'block';
        
        // Simpan ke Firebase
        db.ref('rooms/' + roomId).set({
            info: {
                nominal: document.getElementById('money-display').textContent,
                type: transType,
                seller: userName,
                wa: document.getElementById('seller-wa').value,
                time: firebase.database.ServerValue.TIMESTAMP
            }
        });
        
        // Notif Telegram
        let now = new Date();
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: `🏪 SELLER CREATE ROOM\n\nNama: ${userName}\nNominal: ${document.getElementById('money-display').textContent}\nType: ${transType}\nRoom: ${roomId}\n\n📅 ${now.toLocaleDateString('id-ID')}\n⏰ ${now.toLocaleTimeString('id-ID')}`
            })
        });
    }
    
    function copyCode() {
        navigator.clipboard.writeText(roomId);
        alert('Code: ' + roomId);
    }
    
    // Join Buyer
    function joinBuyer() {
        userName = document.getElementById('buyer-name').value;
        roomId = document.getElementById('buyer-code').value;
        
        db.ref('rooms/' + roomId).once('value', snap => {
            if(snap.exists()) {
                let info = snap.val().info;
                document.getElementById('head-nominal').textContent = info.nominal;
                document.getElementById('head-type').textContent = info.type;
                
                db.ref('rooms/' + roomId + '/buyer').set({
                    name: userName,
                    wa: document.getElementById('buyer-wa').value
                });
                
                enterChat('buyer');
                
                // Notif Telegram
                let now = new Date();
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🛒 BUYER JOIN\n\nNama: ${userName}\nRoom: ${roomId}\nNominal: ${info.nominal}\n\n📅 ${now.toLocaleDateString('id-ID')}\n⏰ ${now.toLocaleTimeString('id-ID')}`
                    })
                });
            } else {
                alert('Room tidak ditemukan!');
            }
        });
    }
    
    // Masuk Chat
    function enterChat(role) {
        userRole = role;
        showPage('chat');
        
        let msgRef = db.ref('rooms/' + roomId + '/messages');
        
        // Clear dulu
        document.getElementById('chat-messages').innerHTML = '';
        
        // Load pesan
        msgRef.on('child_added', snap => {
            let m = snap.val();
            let div = document.createElement('div');
            
            if(m.type === 'img') {
                div.className = 'msg-img';
                div.innerHTML = `<img src="${m.url}" onclick="window.open('${m.url}')">`;
            } else {
                let isMe = m.from === userName;
                div.className = isMe ? 'msg-out' : 'msg-in';
                div.innerHTML = `
                    ${!isMe ? `<div class="from">${m.from}</div>` : ''}
                    <div class="bubble">${m.text}</div>
                    <div class="time">${m.time || ''} ${isMe ? '✓✓' : ''}</div>
                `;
            }
            
            document.getElementById('chat-messages').appendChild(div);
            document.getElementById('chat-messages').scrollTop = 999999;
        });
        
        // Sambutan admin untuk seller
        if(role === 'seller') {
            setTimeout(() => {
                msgRef.push({
                    from: 'Admin MC',
                    text: `Halo ${userName}! 👋\n\nSaya Admin MC.\nRoom: ${roomId}\n\nSilakan tunggu buyer.`,
                    time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
                    type: 'text'
                });
            }, 500);
        }
    }
    
    function sendMsg() {
        let inp = document.getElementById('msg-in');
        let txt = inp.value.trim();
        if(!txt) return;
        
        db.ref('rooms/' + roomId + '/messages').push({
            from: userName,
            text: txt,
            time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
            type: 'text'
        });
        
        inp.value = '';
    }
    
    function sendImage(input) {
        let file = input.files[0];
        if(!file) return;
        
        let ref = storage.ref('chat/' + Date.now() + '.jpg');
        ref.put(file).then(() => {
            ref.getDownloadURL().then(url => {
                db.ref('rooms/' + roomId + '/messages').push({
                    from: userName,
                    url: url,
                    type: 'img'
                });
            });
        });
    }
    
    function exitChat() {
        location.reload();
    }
    
    // Admin Load Rooms
    function loadAdminRooms() {
        db.ref('rooms').on('value', snap => {
            let box = document.getElementById('admin-rooms');
            box.innerHTML = '';
            
            snap.forEach(child => {
                let id = child.key;
                let info = child.val().info;
                let buyer = child.val().buyer;
                
                let card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div>
                        <div style="color:#3390ec;font-weight:bold">Room: ${id}</div>
                        <div>${info.nominal} | ${info.type}</div>
                        <div style="font-size:12px;color:#888">Seller: ${info.seller}</div>
                        ${buyer ? `<div style="font-size:12px;color:#4ade80">Buyer: ${buyer.name} ✅</div>` : '<div style="font-size:12px;color:#fbbf24">Menunggu buyer...</div>'}
                    </div>
                    <button onclick="adminJoin('${id}')" style="background:#3390ec;color:white;border:none;padding:8px 16px;border-radius:8px">Masuk</button>
                `;
                box.appendChild(card);
            });
        });
    }
    
    function adminJoin(id) {
        roomId = id;
        userName = 'Admin MC';
        userRole = 'admin';
        
        db.ref('rooms/' + id + '/info').once('value', s => {
            let info = s.val();
            document.getElementById('head-nominal').textContent = info.nominal;
            document.getElementById('head-type').textContent = info.type;
            enterChat('admin');
        });
    }
</script>

</body>
</html>
